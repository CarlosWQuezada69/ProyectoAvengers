services:
  postgres:
    image: postgres:16-alpine
    container_name: avengers-db
    environment:
      POSTGRES_DB: proyecto_avengers
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    container_name: avengers-api
    environment:
      CONNECTIONSTRINGS__DEFAULT: "Host=postgres;Database=proyecto_avengers;Username=postgres;Password=postgres"
      JWT__SECRET: "${JWT_SECRET:-SuperSecretKey_Dev_ChangeInProduction_MinLength32Chars!}"
      JWT__ISSUER: "ProyectoAvengers"
      JWT__AUDIENCE: "ProyectoAvengers"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@avengers.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-Admin123!}"
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ASPNETCORE_URLS: "http://+:8080"
      FILESTORAGE__PATH: "/app/uploads"
      FILESTORAGE__URL: "/uploads"
      CORS__ALLOWEDORIGINS__0: "${CORS_ORIGIN:-http://localhost:4200}"
    ports:
      - "${API_PORT:-5000}:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
